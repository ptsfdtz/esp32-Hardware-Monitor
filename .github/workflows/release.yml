name: Build ESP32 Hardware Monitor

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Windows package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Rust formatting
        shell: pwsh
        run: cargo fmt --check

      - name: Build Windows package
        shell: pwsh
        run: .\scripts\build-monitor-setup.ps1
