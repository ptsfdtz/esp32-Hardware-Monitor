name: Build and Release ESP32 Hardware Monitor

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Rust formatting
        shell: pwsh
        run: cargo fmt --check

      - name: Build and publish Windows package
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .\scripts\build-monitor-setup.ps1

          if ("${{ github.ref }}" -notlike "refs/tags/*") {
            Write-Host "Release publication skipped for ${{ github.ref }}"
            exit 0
          }

          $tag = "${{ github.ref_name }}"
          $safeTag = $tag -replace '[\\/:*?"<>|]', '-'
          $assetName = "ESP32HardwareMonitor-$safeTag-windows-x64.zip"
          $checksumName = "$assetName.sha256"
          New-Item -ItemType Directory -Force release | Out-Null
          $assetPath = Join-Path "release" $assetName
          $checksumPath = Join-Path "release" $checksumName
          Compress-Archive -LiteralPath dist\ESP32HardwareMonitor.exe -DestinationPath $assetPath -Force
          $sha256 = (Get-FileHash $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -LiteralPath $checksumPath -Value "$sha256 *$assetName" -NoNewline -Encoding ascii

          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assetPath $checksumPath --clobber
          } else {
            gh release create $tag $assetPath $checksumPath --title "ESP32 Hardware Monitor $tag" --generate-notes
          }
