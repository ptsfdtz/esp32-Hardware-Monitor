name: Build and Release ESP32 Hardware Monitor

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Build Windows package
        shell: pwsh
        run: .\scripts\build-monitor-setup.ps1

      - name: Check Rust formatting
        shell: pwsh
        run: cargo fmt --check

      - name: Run Rust tests
        shell: pwsh
        run: cargo test --release

      - name: Prepare release asset
        id: asset
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $safeTag = $tag -replace '[\\/:*?"<>|]', '-'
          $assetName = "ESP32HardwareMonitor-$safeTag-windows-x64.exe"
          $checksumName = "$assetName.sha256"
          New-Item -ItemType Directory -Force release | Out-Null
          $assetPath = Join-Path "release" $assetName
          $checksumPath = Join-Path "release" $checksumName
          Copy-Item -Force dist\ESP32HardwareMonitor.exe $assetPath
          $sha256 = (Get-FileHash $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -LiteralPath $checksumPath -Value "$sha256 *$assetName" -NoNewline -Encoding ascii
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT
          "checksum_name=$checksumName" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.asset.outputs.asset_name }}
          path: |
            release/${{ steps.asset.outputs.asset_name }}
            release/${{ steps.asset.outputs.checksum_name }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "release\${{ steps.asset.outputs.asset_name }}"
          $checksum = "release\${{ steps.asset.outputs.checksum_name }}"

          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset $checksum --clobber
          } else {
            gh release create $tag $asset $checksum --title "ESP32 Hardware Monitor $tag" --generate-notes
          }
